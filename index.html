<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base-url" content="https://cbvs.especiallyforus.net">
  <title>Вернуть телегу</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080808;
      --text: #eaf6ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(68, 196, 255, 0.26), transparent 28%),
        radial-gradient(circle at bottom, rgba(80, 191, 255, 0.18), transparent 34%),
        radial-gradient(circle at center, rgba(20, 102, 158, 0.16), transparent 52%),
        linear-gradient(180deg, #081724 0%, #0a1220 42%, #080808 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    .ambient-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .ambient-glow::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(78, 206, 255, 0.18) 0%, rgba(18, 56, 86, 0.12) 34%, rgba(8, 8, 8, 0.28) 100%);
    }

    .ambient-glow img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(125vmin, 1100px);
      height: auto;
      transform: translate(-50%, -50%) scale(2.3);
      filter:
        blur(92px)
        grayscale(0.12)
        saturate(1.08)
        hue-rotate(160deg)
        brightness(1.24);
      opacity: 0.34;
      mix-blend-mode: screen;
      animation: ambientFloat 7s ease-in-out infinite;
    }

    .screen {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .stack {
      width: min(100%, 520px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(38px, 7vw, 62px);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #ffffff;
      text-shadow:
        0 0 18px rgba(255, 255, 255, 0.25),
        0 0 42px rgba(78, 206, 255, 0.22);
    }

    .steps-card {
      width: min(100%, 420px);
      padding: 16px 18px;
      border-radius: 22px;
      background: rgba(12, 19, 32, 0.72);
      border: 1px solid rgba(142, 223, 255, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 14px 40px rgba(0, 0, 0, 0.28),
        0 0 26px rgba(64, 191, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .steps-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
      text-align: left;
    }

    .steps-list li {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: center;
      color: rgba(234, 246, 255, 0.94);
      font-size: 16px;
      line-height: 1.35;
    }

    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #ffffff;
      background: linear-gradient(180deg, #4cd1ff 0%, #159df0 100%);
      box-shadow:
        0 8px 18px rgba(33, 153, 228, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.36);
    }

    .hero-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .hero-media {
      width: min(100%, 320px);
      height: auto;
      display: block;
      filter:
        drop-shadow(0 18px 36px rgba(0, 0, 0, 0.42))
        drop-shadow(0 0 18px rgba(42, 167, 235, 0.18));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      object-fit: contain;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      outline: none;
      background: linear-gradient(180deg, #42c5ff 0%, #1d9df2 100%);
      width: min(100%, 240px);
      min-height: 60px;
      padding: 0 28px;
      font-size: 18px;
      color: #fff;
      font-weight: 600;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.26),
        0 10px 24px rgba(21, 157, 240, 0.26);
    }

    .label {
      text-align: center;
      line-height: 1.1;
      white-space: nowrap;
    }

    .button:hover {
      transform: translateY(-2px);
      background: linear-gradient(180deg, #56ccff 0%, #2aa8f8 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 14px 28px rgba(21, 157, 240, 0.3);
    }

    .button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 6px 14px rgba(21, 157, 240, 0.22);
    }

    .button:focus-visible {
      outline: 2px solid rgba(122, 214, 255, 0.9);
      outline-offset: 6px;
    }

    .hero-credit {
      margin: 8px 0 0;
      font-size: 13px;
      line-height: 1.4;
      color: rgba(234, 246, 255, 0.72);
    }

    .hero-credit a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: rgba(234, 246, 255, 0.45);
      text-underline-offset: 3px;
    }

    .hero-credit a:hover {
      color: #ffffff;
      text-decoration-color: rgba(255, 255, 255, 0.8);
    }

    .server-caption {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(234, 246, 255, 0.6);
    }

    @keyframes ambientFloat {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(2.2);
        opacity: 0.2;
      }
      50% {
        transform: translate(-50%, -50%) scale(2.42);
        opacity: 0.3;
      }
    }

    @media (max-width: 820px) {
      .stack {
        gap: 20px;
      }

      .ambient-glow img {
        width: min(170vmin, 900px);
        filter:
          blur(82px)
          grayscale(0.1)
          saturate(1)
          hue-rotate(160deg)
          brightness(1.18);
        opacity: 0.3;
      }

      .hero-media {
        width: min(100%, 260px);
      }

      .hero-title {
        font-size: clamp(34px, 10vw, 48px);
      }

      .steps-card {
        padding: 14px 14px;
      }

      .steps-list li {
        font-size: 15px;
      }

      .button {
        width: min(100%, 220px);
      }
    }
  </style>
</head>
<body>
  <div class="ambient-glow" aria-hidden="true">
    <img
      src="./utyaduckfull_agadbiyaajnieuk.gif"
      alt=""
      draggable="false"
    >
  </div>
  <main class="screen">
    <section class="stack">
      <div class="hero-copy">
        <h1 class="hero-title">Ускорь Telegram!</h1>
        <div class="steps-card">
          <ol class="steps-list">
            <li>
              <span class="step-number">1</span>
              <span>Жми кнопку ниже.</span>
            </li>
            <li>
              <span class="step-number">2</span>
              <span>Сервер подберётся автоматически.</span>
            </li>
            <li>
              <span class="step-number">3</span>
              <span>Подтверди подключение в приложении.</span>
            </li>
          </ol>
        </div>
      </div>
      <div class="hero-shell" aria-hidden="true">
        <img
          class="hero-media"
          src="./utyaduckfull_agadbiyaajnieuk.gif"
          alt="Анимированная утка с телефоном Telegram"
          draggable="false"
        >
      </div>
      <button id="openProxyButton" class="button" type="button" aria-label="Ускорить Telegram">
        <span class="label">Ускорить Telegram</span>
      </button>
      <p class="hero-credit">
        <a href="https://t.me/MyBatyaOnline_bot?start=proxy_utka" target="_blank" rel="noopener noreferrer">Разработано командой Батя VPN</a>
      </p>
    </section>
  </main>

  <script>
    const configuredApiBaseUrl =
      window.__API_BASE_URL__ ||
      document.querySelector('meta[name="api-base-url"]')?.content ||
      "https://cbvs.especiallyforus.net";
    const API_BASE_URL = configuredApiBaseUrl.replace(/\/$/, "");
    const button = document.getElementById("openProxyButton");

    function buildAppProxyLink(link) {
      try {
        if (link.startsWith("tg://")) {
          return link;
        }

        const url = new URL(link);
        const isTelegramProxyHost =
          url.hostname === "t.me" ||
          url.hostname === "telegram.me" ||
          url.hostname === "www.t.me";

        if (isTelegramProxyHost && url.pathname === "/proxy") {
          return "tg://proxy?" + url.searchParams.toString();
        }
      } catch {}

      return link;
    }

    function openLink(url) {
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.rel = "noopener noreferrer";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
    }

    function connectProxy(link) {
      const appLink = buildAppProxyLink(link);
      let appWasOpened = false;

      const handleAppSwitch = () => {
        appWasOpened = true;
      };

      window.addEventListener("blur", handleAppSwitch, { once: true });
      document.addEventListener("visibilitychange", handleAppSwitch, { once: true });

      openLink(appLink);

      setTimeout(() => {
        if (!appWasOpened && document.visibilityState === "visible") {
          openLink(link);
        }
      }, 900);
    }

    async function createAccess(actionButton) {
      const originalLabel = actionButton.innerHTML;
      actionButton.disabled = true;
      actionButton.innerHTML = `Подключаем...<span class="server-caption">Подбираем сервер автоматически</span>`;

      try {
        const response = await fetch(`${API_BASE_URL}/api/public/access/create`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json"
          },
          body: JSON.stringify({})
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.detail || "Не удалось получить ссылку сервера");
        }

        connectProxy(payload.proxy_link);
      } catch (error) {
        window.alert(error.message || "Ошибка подключения");
      } finally {
        actionButton.disabled = false;
        actionButton.innerHTML = originalLabel;
      }
    }

    button.addEventListener("click", () => {
      createAccess(button);
    });
  </script>
</body>
</html>
