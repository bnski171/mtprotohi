<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base-url" content="https://cbvs.especiallyforus.net">
  <title>Вернуть телегу</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080808;
      --text: #eaf6ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(68, 196, 255, 0.26), transparent 28%),
        radial-gradient(circle at bottom, rgba(80, 191, 255, 0.18), transparent 34%),
        radial-gradient(circle at center, rgba(20, 102, 158, 0.16), transparent 52%),
        linear-gradient(180deg, #081724 0%, #0a1220 42%, #080808 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    .ambient-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .ambient-glow::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(78, 206, 255, 0.18) 0%, rgba(18, 56, 86, 0.12) 34%, rgba(8, 8, 8, 0.28) 100%);
    }

    .ambient-glow img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(125vmin, 1100px);
      height: auto;
      transform: translate(-50%, -50%) scale(2.3);
      filter:
        blur(92px)
        grayscale(0.12)
        saturate(1.08)
        hue-rotate(160deg)
        brightness(1.24);
      opacity: 0.34;
      mix-blend-mode: screen;
      animation: ambientFloat 7s ease-in-out infinite;
    }

    .screen {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .stack {
      width: min(100%, 520px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(38px, 7vw, 62px);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #ffffff;
      text-shadow:
        0 0 18px rgba(255, 255, 255, 0.25),
        0 0 42px rgba(78, 206, 255, 0.22);
    }

    .steps-card {
      width: min(100%, 420px);
      padding: 16px 18px;
      border-radius: 22px;
      background: rgba(12, 19, 32, 0.72);
      border: 1px solid rgba(142, 223, 255, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 14px 40px rgba(0, 0, 0, 0.28),
        0 0 26px rgba(64, 191, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .steps-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
      text-align: left;
    }

    .steps-list li {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: center;
      color: rgba(234, 246, 255, 0.94);
      font-size: 16px;
      line-height: 1.35;
    }

    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #ffffff;
      background: linear-gradient(180deg, #4cd1ff 0%, #159df0 100%);
      box-shadow:
        0 8px 18px rgba(33, 153, 228, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.36);
    }

    .hero-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .hero-media {
      width: min(100%, 320px);
      height: auto;
      display: block;
      filter:
        drop-shadow(0 18px 36px rgba(0, 0, 0, 0.42))
        drop-shadow(0 0 18px rgba(42, 167, 235, 0.18));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      object-fit: contain;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      outline: none;
      background: linear-gradient(180deg, #42c5ff 0%, #1d9df2 100%);
      width: min(100%, 240px);
      min-height: 60px;
      padding: 0 28px;
      font-size: 18px;
      color: #fff;
      font-weight: 600;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.26),
        0 10px 24px rgba(21, 157, 240, 0.26);
    }

    .label {
      text-align: center;
      line-height: 1.1;
      white-space: nowrap;
    }

    .button:hover {
      transform: translateY(-2px);
      background: linear-gradient(180deg, #56ccff 0%, #2aa8f8 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 14px 28px rgba(21, 157, 240, 0.3);
    }

    .button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 6px 14px rgba(21, 157, 240, 0.22);
    }

    .button:focus-visible {
      outline: 2px solid rgba(122, 214, 255, 0.9);
      outline-offset: 6px;
    }

    .hero-credit {
      margin: 8px 0 0;
      font-size: 13px;
      line-height: 1.4;
      color: rgba(234, 246, 255, 0.72);
    }

    .hero-credit a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: rgba(234, 246, 255, 0.45);
      text-underline-offset: 3px;
    }

    .hero-credit a:hover {
      color: #ffffff;
      text-decoration-color: rgba(255, 255, 255, 0.8);
    }

    .modal {
      --fx-x: 50%;
      --fx-y: 50%;
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(3, 8, 16, 0.66);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
      z-index: 20;
    }

    .modal::before,
    .modal::after {
      content: "";
      position: absolute;
      left: var(--fx-x);
      top: var(--fx-y);
      transform: translate(-50%, -50%) scale(0.2);
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
    }

    .modal::before {
      width: 180px;
      height: 180px;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.5) 18%, rgba(150, 229, 255, 0.18) 38%, rgba(255, 255, 255, 0) 70%);
      mix-blend-mode: screen;
      filter: blur(5px);
    }

    .modal::after {
      width: 280px;
      height: 280px;
      border: 1px solid rgba(205, 244, 255, 0.55);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12) inset,
        0 0 40px rgba(115, 222, 255, 0.2);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .modal.is-open::before {
      animation: modalFlash 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .modal.is-open::after {
      animation: modalLens 0.95s cubic-bezier(0.16, 0.84, 0.22, 1) forwards;
    }

    .modal-card {
      width: min(100%, 320px);
      padding: 18px;
      border-radius: 22px;
      background: rgba(11, 18, 31, 0.94);
      border: 1px solid rgba(142, 223, 255, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 24px 60px rgba(0, 0, 0, 0.42),
        0 0 30px rgba(64, 191, 255, 0.1);
      transform: translateY(18px) scale(0.92);
      opacity: 0;
      transition:
        transform 0.42s cubic-bezier(0.2, 0.9, 0.2, 1),
        opacity 0.28s ease;
      position: relative;
      overflow: hidden;
    }

    .modal-card::before {
      content: "";
      position: absolute;
      inset: -30%;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.06) 22%, rgba(255, 255, 255, 0) 54%);
      opacity: 0;
      transform: scale(0.75);
      pointer-events: none;
    }

    .modal.is-open .modal-card {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal.is-open .modal-card::before {
      animation: modalCardSheen 0.7s 0.08s ease-out forwards;
    }

    .modal-title {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
    }

    .modal-text {
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.4;
      color: rgba(234, 246, 255, 0.72);
    }

    .server-list {
      display: grid;
      gap: 10px;
    }

    .server-button {
      width: 100%;
      border: 1px solid rgba(142, 223, 255, 0.16);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(24, 40, 60, 0.94) 0%, rgba(14, 24, 39, 0.96) 100%);
      color: #ffffff;
      padding: 14px 16px;
      text-align: left;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .server-button:hover {
      transform: translateY(-1px);
      border-color: rgba(142, 223, 255, 0.34);
      box-shadow: 0 10px 26px rgba(30, 128, 196, 0.24);
    }

    .server-button:focus-visible {
      outline: 2px solid rgba(122, 214, 255, 0.9);
      outline-offset: 3px;
    }

    .server-caption {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(234, 246, 255, 0.6);
    }

    @keyframes modalFlash {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      20% {
        opacity: 0.95;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(3.6);
      }
    }

    @keyframes modalLens {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      25% {
        opacity: 0.5;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(2.8);
      }
    }

    @keyframes modalCardSheen {
      0% {
        opacity: 0;
        transform: scale(0.72);
      }
      35% {
        opacity: 0.85;
      }
      100% {
        opacity: 0;
        transform: scale(1.12);
      }
    }

    @keyframes ambientFloat {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(2.2);
        opacity: 0.2;
      }
      50% {
        transform: translate(-50%, -50%) scale(2.42);
        opacity: 0.3;
      }
    }

    @media (max-width: 820px) {
      .stack {
        gap: 20px;
      }

      .ambient-glow img {
        width: min(170vmin, 900px);
        filter:
          blur(82px)
          grayscale(0.1)
          saturate(1)
          hue-rotate(160deg)
          brightness(1.18);
        opacity: 0.3;
      }

      .hero-media {
        width: min(100%, 260px);
      }

      .hero-title {
        font-size: clamp(34px, 10vw, 48px);
      }

      .steps-card {
        padding: 14px 14px;
      }

      .steps-list li {
        font-size: 15px;
      }

      .button {
        width: min(100%, 220px);
      }
    }
  </style>
</head>
<body>
  <div class="ambient-glow" aria-hidden="true">
    <img
      src="./utyaduckfull_agadbiyaajnieuk.gif"
      alt=""
      draggable="false"
    >
  </div>
  <main class="screen">
    <section class="stack">
      <div class="hero-copy">
        <h1 class="hero-title">Ускорь Telegram!</h1>
        <div class="steps-card">
          <ol class="steps-list">
            <li>
              <span class="step-number">1</span>
              <span>Жми кнопку ниже.</span>
            </li>
            <li>
              <span class="step-number">2</span>
              <span>Выбери любой сервер.</span>
            </li>
            <li>
              <span class="step-number">3</span>
              <span>Подтверди подключение в приложении.</span>
            </li>
          </ol>
        </div>
      </div>
      <div class="hero-shell" aria-hidden="true">
        <img
          class="hero-media"
          src="./utyaduckfull_agadbiyaajnieuk.gif"
          alt="Анимированная утка с телефоном Telegram"
          draggable="false"
        >
      </div>
      <button id="openProxyButton" class="button" type="button" aria-label="Ускорить Telegram">
        <span class="label">Ускорить Telegram</span>
      </button>
      <p class="hero-credit">
        <a href="https://t.me/MyBatyaVPN_bot?start=proxy_utka" target="_blank" rel="noopener noreferrer">Разработано командой Батя VPN</a>
      </p>
    </section>
  </main>

  <div id="serverModal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="serverModalTitle">
      <h2 id="serverModalTitle" class="modal-title">Выбери сервер</h2>
      <p class="modal-text">Выбери сервер. Если не работает, попробуй другой.</p>
      <p id="modalStatus" class="modal-text">Подгружаем доступные серверы...</p>
      <div id="serverList" class="server-list"></div>
    </div>
  </div>

  <script>
    const configuredApiBaseUrl =
      window.__API_BASE_URL__ ||
      document.querySelector('meta[name="api-base-url"]')?.content ||
      "https://cbvs.especiallyforus.net";
    const API_BASE_URL = configuredApiBaseUrl.replace(/\/$/, "");
    const button = document.getElementById("openProxyButton");
    const modal = document.getElementById("serverModal");
    const serverList = document.getElementById("serverList");
    const modalStatus = document.getElementById("modalStatus");
    let serversCache = [];

    function buildAppProxyLink(link) {
      try {
        if (link.startsWith("tg://")) {
          return link;
        }

        const url = new URL(link);
        const isTelegramProxyHost =
          url.hostname === "t.me" ||
          url.hostname === "telegram.me" ||
          url.hostname === "www.t.me";

        if (isTelegramProxyHost && url.pathname === "/proxy") {
          return "tg://proxy?" + url.searchParams.toString();
        }
      } catch {}

      return link;
    }

    function openLink(url) {
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.rel = "noopener noreferrer";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
    }

    function connectProxy(link) {
      const appLink = buildAppProxyLink(link);
      let appWasOpened = false;

      const handleAppSwitch = () => {
        appWasOpened = true;
      };

      window.addEventListener("blur", handleAppSwitch, { once: true });
      document.addEventListener("visibilitychange", handleAppSwitch, { once: true });

      openLink(appLink);

      setTimeout(() => {
        if (!appWasOpened && document.visibilityState === "visible") {
          openLink(link);
        }
      }, 900);
    }

    function setModalStatus(message) {
      modalStatus.textContent = message;
    }

    function renderServers(servers) {
      serverList.innerHTML = "";

      if (!servers.length) {
        setModalStatus("Сейчас нет доступных серверов. Попробуй чуть позже.");
        return;
      }

      setModalStatus("");

      servers.forEach((server) => {
        const button = document.createElement("button");
        button.className = "server-button";
        button.type = "button";
        button.textContent = server.name;
        button.addEventListener("click", async () => {
          await createAccess(server.id, button);
        });
        serverList.appendChild(button);
      });
    }

    async function fetchServers() {
      setModalStatus("Подгружаем доступные серверы...");

      try {
        const response = await fetch(`${API_BASE_URL}/api/public/servers`, {
          headers: {
            Accept: "application/json"
          }
        });
        if (!response.ok) {
          throw new Error("Не удалось получить список серверов");
        }

        serversCache = await response.json();
        renderServers(serversCache);
      } catch (error) {
        serverList.innerHTML = "";
        setModalStatus(error.message || "Ошибка загрузки серверов");
      }
    }

    async function createAccess(serverId, actionButton) {
      const originalLabel = actionButton.innerHTML;
      actionButton.disabled = true;
      actionButton.innerHTML = `Подключаем...<span class="server-caption">Получаем ссылку сервера</span>`;

      try {
        const response = await fetch(`${API_BASE_URL}/api/public/access/create`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json"
          },
          body: JSON.stringify({ server_id: serverId })
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.detail || "Не удалось получить ссылку сервера");
        }

        closeModal();
        connectProxy(payload.proxy_link);
      } catch (error) {
        setModalStatus(error.message || "Ошибка подключения");
      } finally {
        actionButton.disabled = false;
        actionButton.innerHTML = originalLabel;
      }
    }

    function openModal(event) {
      const clickX = event?.clientX ?? window.innerWidth / 2;
      const clickY = event?.clientY ?? window.innerHeight / 2;

      modal.style.setProperty("--fx-x", `${clickX}px`);
      modal.style.setProperty("--fx-y", `${clickY}px`);
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      fetchServers();
    }

    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
    }

    button.addEventListener("click", openModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("is-open")) {
        closeModal();
      }
    });
  </script>
</body>
</html>
