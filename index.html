<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вернуть телегу</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080808;
      --text: #eaf6ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(68, 196, 255, 0.26), transparent 28%),
        radial-gradient(circle at bottom, rgba(80, 191, 255, 0.18), transparent 34%),
        radial-gradient(circle at center, rgba(20, 102, 158, 0.16), transparent 52%),
        linear-gradient(180deg, #081724 0%, #0a1220 42%, #080808 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    .ambient-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .ambient-glow::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(78, 206, 255, 0.18) 0%, rgba(18, 56, 86, 0.12) 34%, rgba(8, 8, 8, 0.28) 100%);
    }

    .ambient-glow img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(125vmin, 1100px);
      height: auto;
      transform: translate(-50%, -50%) scale(2.3);
      filter:
        blur(92px)
        grayscale(0.12)
        saturate(1.08)
        hue-rotate(160deg)
        brightness(1.24);
      opacity: 0.34;
      mix-blend-mode: screen;
      animation: ambientFloat 7s ease-in-out infinite;
    }

    .screen {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .stack {
      width: min(100%, 520px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(38px, 7vw, 62px);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #ffffff;
      text-shadow:
        0 0 18px rgba(255, 255, 255, 0.25),
        0 0 42px rgba(78, 206, 255, 0.22);
    }

    .steps-card {
      width: min(100%, 420px);
      padding: 16px 18px;
      border-radius: 22px;
      background: rgba(12, 19, 32, 0.72);
      border: 1px solid rgba(142, 223, 255, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 14px 40px rgba(0, 0, 0, 0.28),
        0 0 26px rgba(64, 191, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .steps-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
      text-align: left;
    }

    .steps-list li {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: center;
      color: rgba(234, 246, 255, 0.94);
      font-size: 16px;
      line-height: 1.35;
    }

    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #ffffff;
      background: linear-gradient(180deg, #4cd1ff 0%, #159df0 100%);
      box-shadow:
        0 8px 18px rgba(33, 153, 228, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.36);
    }

    .hero-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .hero-media {
      width: min(100%, 320px);
      height: auto;
      display: block;
      filter:
        drop-shadow(0 18px 36px rgba(0, 0, 0, 0.42))
        drop-shadow(0 0 18px rgba(42, 167, 235, 0.18));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      object-fit: contain;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .button {
      border: none;
      outline: none;
      background: linear-gradient(180deg, #4cd1ff 0%, #159df0 100%);
      width: min(100%, 240px);
      min-height: 60px;
      padding: 0 28px;
      font-size: 18px;
      color: #fff;
      font-weight: 600;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
      transition: all 0.3s;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.34),
        inset 0 -8px 16px rgba(10, 83, 142, 0.22),
        0 14px 32px rgba(21, 157, 240, 0.34);
    }

    .button::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(170, 233, 255, 0.34);
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.55),
        0 0 34px rgba(76, 209, 255, 0.75),
        0 0 58px rgba(21, 157, 240, 0.58);
      width: 108%;
      height: 126%;
      z-index: -1;
      border-radius: inherit;
      transition: all 0.3s;
    }

    .gradient-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 112%;
      height: 126%;
      overflow: hidden;
      border-radius: inherit;
      z-index: -2;
      filter: blur(14px);
      transition: all 0.3s;
    }

    .gradient {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 125%;
      aspect-ratio: 1;
      border-radius: 100%;
      transition: all 0.3s;
      background-image: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0),
        rgba(255, 255, 255, 0.92),
        rgba(255, 255, 255, 1),
        rgba(255, 255, 255, 0.9),
        rgba(255, 255, 255, 0)
      );
      animation: rotate 2s linear infinite;
      filter: blur(10px);
    }

    .label {
      position: relative;
      z-index: 1;
      width: auto;
      min-height: 0;
      padding: 0;
      text-align: center;
      line-height: 1.1;
      border-radius: 0;
      background: none;
      box-shadow: none;
      white-space: nowrap;
      text-shadow:
        0 1px 0 rgba(10, 83, 142, 0.22),
        0 0 10px rgba(255, 255, 255, 0.18);
    }

    .button:hover .gradient-container {
      transform: translate(-50%, -50%) scale(0.98);
      filter: blur(10px);
    }

    .button:hover .gradient {
      filter: blur(6px);
    }

    .button:active {
      transform: translateY(2px);
    }

    .button:focus-visible {
      outline: 2px solid rgba(122, 214, 255, 0.9);
      outline-offset: 6px;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(3, 8, 16, 0.66);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
      z-index: 20;
    }

    .modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .modal-card {
      width: min(100%, 320px);
      padding: 18px;
      border-radius: 22px;
      background: rgba(11, 18, 31, 0.94);
      border: 1px solid rgba(142, 223, 255, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 24px 60px rgba(0, 0, 0, 0.42),
        0 0 30px rgba(64, 191, 255, 0.1);
    }

    .modal-title {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
    }

    .modal-text {
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.4;
      color: rgba(234, 246, 255, 0.72);
    }

    .server-list {
      display: grid;
      gap: 10px;
    }

    .server-button {
      width: 100%;
      border: 1px solid rgba(142, 223, 255, 0.16);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(24, 40, 60, 0.94) 0%, rgba(14, 24, 39, 0.96) 100%);
      color: #ffffff;
      padding: 14px 16px;
      text-align: left;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .server-button:hover {
      transform: translateY(-1px);
      border-color: rgba(142, 223, 255, 0.34);
      box-shadow: 0 10px 26px rgba(30, 128, 196, 0.24);
    }

    .server-button:focus-visible {
      outline: 2px solid rgba(122, 214, 255, 0.9);
      outline-offset: 3px;
    }

    .server-caption {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(234, 246, 255, 0.6);
    }

    @keyframes rotate {
      0% {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      100% {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes ambientFloat {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(2.2);
        opacity: 0.2;
      }
      50% {
        transform: translate(-50%, -50%) scale(2.42);
        opacity: 0.3;
      }
    }

    @media (max-width: 820px) {
      .stack {
        gap: 20px;
      }

      .ambient-glow img {
        width: min(170vmin, 900px);
        filter:
          blur(82px)
          grayscale(0.1)
          saturate(1)
          hue-rotate(160deg)
          brightness(1.18);
        opacity: 0.3;
      }

      .hero-media {
        width: min(100%, 260px);
      }

      .hero-title {
        font-size: clamp(34px, 10vw, 48px);
      }

      .steps-card {
        padding: 14px 14px;
      }

      .steps-list li {
        font-size: 15px;
      }

      .button {
        width: min(100%, 220px);
      }
    }
  </style>
</head>
<body>
  <div class="ambient-glow" aria-hidden="true">
    <img
      src="./utyaduckfull_agadbiyaajnieuk.gif"
      alt=""
      draggable="false"
    >
  </div>
  <main class="screen">
    <section class="stack">
      <div class="hero-copy">
        <h1 class="hero-title">Ускорь телеграм!</h1>
        <div class="steps-card">
          <ol class="steps-list">
            <li>
              <span class="step-number">1</span>
              <span>Жми кнопку ниже.</span>
            </li>
            <li>
              <span class="step-number">2</span>
              <span>Выбери любой сервер.</span>
            </li>
            <li>
              <span class="step-number">3</span>
              <span>Подтверди подключение в приложении.</span>
            </li>
          </ol>
        </div>
      </div>
      <div class="hero-shell" aria-hidden="true">
        <img
          class="hero-media"
          src="./utyaduckfull_agadbiyaajnieuk.gif"
          alt="Анимированная утка с телефоном Telegram"
          draggable="false"
        >
      </div>
      <button id="openProxyButton" class="button" type="button" aria-label="Ускорить телеграм">
        <span class="label">Ускорить телеграм</span>
        <span class="gradient-container" aria-hidden="true">
          <span class="gradient"></span>
        </span>
      </button>
    </section>
  </main>

  <div id="serverModal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="serverModalTitle">
      <h2 id="serverModalTitle" class="modal-title">Выбери сервер</h2>
      <p class="modal-text">Нажми на любой вариант, и Telegram откроет подключение.</p>
      <div class="server-list">
        <button class="server-button" type="button" data-link-index="0">
          Сервер 1
          <span class="server-caption">Быстрое подключение</span>
        </button>
        <button class="server-button" type="button" data-link-index="1">
          Сервер 2
          <span class="server-caption">Запасной сервер</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const linksPool = [
      "https://t.me/proxy?server=alpha.freetelega.me&port=2053&secret=ee667779b701c2b312ea39b17f6142719879612e7275",
      "https://t.me/proxy?server=bravo.freetelega.me&port=2053&secret=eee78e764b14cebc7a57289057cc239bf879612e7275"
    ];

    const button = document.getElementById("openProxyButton");
    const modal = document.getElementById("serverModal");
    const serverButtons = document.querySelectorAll("[data-link-index]");

    function buildAppProxyLink(link) {
      try {
        if (link.startsWith("tg://")) {
          return link;
        }

        const url = new URL(link);
        const isTelegramProxyHost =
          url.hostname === "t.me" ||
          url.hostname === "telegram.me" ||
          url.hostname === "www.t.me";

        if (isTelegramProxyHost && url.pathname === "/proxy") {
          return "tg://proxy?" + url.searchParams.toString();
        }
      } catch {}

      return link;
    }

    function openLink(url) {
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.rel = "noopener noreferrer";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
    }

    function connectProxy(link) {
      const appLink = buildAppProxyLink(link);
      let appWasOpened = false;

      const handleAppSwitch = () => {
        appWasOpened = true;
      };

      window.addEventListener("blur", handleAppSwitch, { once: true });
      document.addEventListener("visibilitychange", handleAppSwitch, { once: true });

      openLink(appLink);

      setTimeout(() => {
        if (!appWasOpened && document.visibilityState === "visible") {
          openLink(link);
        }
      }, 900);
    }

    function openModal() {
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
    }

    button.addEventListener("click", openModal);

    serverButtons.forEach((serverButton) => {
      serverButton.addEventListener("click", () => {
        const index = Number(serverButton.dataset.linkIndex);
        const link = linksPool[index];

        if (!link) {
          return;
        }

        closeModal();
        connectProxy(link);
      });
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("is-open")) {
        closeModal();
      }
    });
  </script>
</body>
</html>
