<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вернуть телегу</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080808;
      --text: #eaf6ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(68, 196, 255, 0.26), transparent 28%),
        radial-gradient(circle at bottom, rgba(80, 191, 255, 0.18), transparent 34%),
        radial-gradient(circle at center, rgba(20, 102, 158, 0.16), transparent 52%),
        linear-gradient(180deg, #081724 0%, #0a1220 42%, #080808 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    .ambient-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .ambient-glow::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(78, 206, 255, 0.18) 0%, rgba(18, 56, 86, 0.12) 34%, rgba(8, 8, 8, 0.28) 100%);
    }

    .ambient-glow img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(125vmin, 1100px);
      height: auto;
      transform: translate(-50%, -50%) scale(2.3);
      filter:
        blur(92px)
        grayscale(0.12)
        saturate(1.08)
        hue-rotate(160deg)
        brightness(1.24);
      opacity: 0.34;
      mix-blend-mode: screen;
      animation: ambientFloat 7s ease-in-out infinite;
    }

    .screen {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
    }

    .hero-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .hero-media {
      width: min(100%, 320px);
      height: auto;
      display: block;
      filter:
        drop-shadow(0 18px 36px rgba(0, 0, 0, 0.42))
        drop-shadow(0 0 18px rgba(42, 167, 235, 0.18));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      object-fit: contain;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .button {
      --white: #f2fbff;
      --button-bg: #29aeff;
      --button-bg-deep: #0f7fd1;
      --radius: 100px;
      outline: none;
      cursor: pointer;
      border: 0;
      position: relative;
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, #6fd8ff 0%, #3fc4ff 24%, var(--button-bg) 58%, var(--button-bg-deep) 100%);
      transition: all 0.2s ease;
      box-shadow:
        inset 0 0.34rem 1rem rgba(255, 255, 255, 0.5),
        inset 0 -0.16rem 0.4rem rgba(2, 34, 56, 0.42),
        inset 0 -0.45rem 1rem rgba(255, 255, 255, 0.26),
        0 0 0 1px rgba(173, 238, 255, 0.3),
        0 1.4rem 2.6rem rgba(34, 160, 225, 0.52),
        0 0.8rem 1.4rem -0.3rem rgba(0, 0, 0, 0.48),
        0 0 38px rgba(72, 196, 255, 0.34);
    }

    .button .wrap {
      font-size: clamp(30px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #ffffff;
      text-shadow:
        0 0 14px rgba(255, 255, 255, 0.95),
        0 0 28px rgba(182, 239, 255, 0.58),
        0 0 42px rgba(122, 214, 255, 0.42),
        0 2px 0 rgba(9, 42, 69, 0.34);
      padding: 30px 42px;
      border-radius: inherit;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
    }

    .button .wrap p {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      transition: all 0.2s ease;
      transform: translateY(2%);
      mask-image: linear-gradient(to bottom, white 40%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, white 40%, transparent);
    }

    .button .wrap::before,
    .button .wrap::after {
      content: "";
      position: absolute;
      transition: all 0.3s ease;
    }

    .button .wrap::before {
      left: -15%;
      right: -15%;
      bottom: 25%;
      top: -100%;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.24);
    }

    .button .wrap::after {
      left: 6%;
      right: 6%;
      top: 12%;
      bottom: 40%;
      border-radius: 22px 22px 0 0;
      box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 1);
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.46) 0%,
        rgba(0, 0, 0, 0) 50%,
        rgba(0, 0, 0, 0) 100%
      );
    }

    .button:hover {
      box-shadow:
        inset 0 0.34rem 0.8rem rgba(255, 255, 255, 0.56),
        inset 0 -0.1rem 0.3rem rgba(2, 34, 56, 0.44),
        inset 0 -0.45rem 1rem rgba(255, 255, 255, 0.32),
        0 1.8rem 3rem rgba(34, 160, 225, 0.6),
        0 0.8rem 1.2rem -0.3rem rgba(0, 0, 0, 0.46),
        0 0 52px rgba(72, 196, 255, 0.45);
    }

    .button:hover .wrap::before {
      transform: translateY(-5%);
    }

    .button:hover .wrap::after {
      opacity: 0.4;
      transform: translateY(5%);
    }

    .button:hover .wrap p {
      transform: translateY(-4%);
    }

    .button:active {
      transform: translateY(4px);
      box-shadow:
        inset 0 0.3rem 0.5rem rgba(255, 255, 255, 0.48),
        inset 0 -0.1rem 0.3rem rgba(2, 34, 56, 0.55),
        inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.18),
        0 1rem 1.6rem rgba(34, 160, 225, 0.42),
        0 0.4rem 0.8rem -0.4rem rgba(0, 0, 0, 0.5),
        0 0 28px rgba(72, 196, 255, 0.28);
    }

    .button:focus-visible {
      outline: 2px solid rgba(122, 214, 255, 0.9);
      outline-offset: 6px;
    }

    @keyframes ambientFloat {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(2.2);
        opacity: 0.2;
      }
      50% {
        transform: translate(-50%, -50%) scale(2.42);
        opacity: 0.3;
      }
    }

    @media (max-width: 820px) {
      .stack {
        gap: 22px;
      }

      .ambient-glow img {
        width: min(170vmin, 900px);
        filter:
          blur(82px)
          grayscale(0.1)
          saturate(1)
          hue-rotate(160deg)
          brightness(1.18);
        opacity: 0.3;
      }

      .hero-media {
        width: min(100%, 260px);
      }

      .button {
        width: min(100%, 420px);
      }

      .button .wrap {
        padding: 28px 26px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient-glow" aria-hidden="true">
    <img
      src="./utyaduckfull_agadbiyaajnieuk.gif"
      alt=""
      draggable="false"
    >
  </div>
  <main class="screen">
    <section class="stack">
      <div class="hero-shell" aria-hidden="true">
        <img
          class="hero-media"
          src="./utyaduckfull_agadbiyaajnieuk.gif"
          alt="Анимированная утка с телефоном Telegram"
          draggable="false"
        >
      </div>
      <button id="openProxyButton" class="button" type="button" aria-label="Вернуть тг">
        <div class="wrap">
          <p>Вернуть тг</p>
        </div>
      </button>
    </section>
  </main>

  <script>
    const linksPool = [
      "https://t.me/proxy?server=alpha.freetelega.me&port=2053&secret=ee667779b701c2b312ea39b17f6142719879612e7275",
      "https://t.me/proxy?server=bravo.freetelega.me&port=2053&secret=eee78e764b14cebc7a57289057cc239bf879612e7275"
    ];

    const button = document.getElementById("openProxyButton");

    function isMobileDevice() {
      return /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent);
    }

    function pickRandomLink() {
      const index = Math.floor(Math.random() * linksPool.length);
      return linksPool[index];
    }

    function buildDesktopProxyLink(link) {
      try {
        if (link.startsWith("tg://")) {
          return link;
        }

        const url = new URL(link);
        const isTelegramProxyHost =
          url.hostname === "t.me" ||
          url.hostname === "telegram.me" ||
          url.hostname === "www.t.me";

        if (isTelegramProxyHost && url.pathname === "/proxy") {
          return "tg://proxy?" + url.searchParams.toString();
        }
      } catch {}

      return link;
    }

    function openProxy() {
      const link = pickRandomLink();

      if (isMobileDevice()) {
        window.location.href = link;
        return;
      }

      const desktopLink = buildDesktopProxyLink(link);
      let appWasOpened = false;

      const handleAppSwitch = () => {
        appWasOpened = true;
      };

      window.addEventListener("blur", handleAppSwitch, { once: true });
      document.addEventListener("visibilitychange", handleAppSwitch, { once: true });

      window.location.href = desktopLink;

      setTimeout(() => {
        if (!appWasOpened && document.visibilityState === "visible") {
          window.location.href = link;
        }
      }, 1200);
    }

    button.addEventListener("click", openProxy);
  </script>
</body>
</html>
