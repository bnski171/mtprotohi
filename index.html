<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вернуть телегу</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080808;
      --text: #eaf6ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(36, 161, 222, 0.14), transparent 28%),
        radial-gradient(circle at bottom, rgba(135, 206, 250, 0.08), transparent 30%),
        linear-gradient(180deg, #061018 0%, #080808 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    .ambient-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .ambient-glow::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(49, 169, 235, 0.08) 0%, rgba(10, 24, 36, 0.06) 36%, rgba(8, 8, 8, 0.3) 100%);
    }

    .ambient-glow img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(125vmin, 1100px);
      height: auto;
      transform: translate(-50%, -50%) scale(2.3);
      filter:
        blur(104px)
        grayscale(0.22)
        saturate(0.7)
        hue-rotate(160deg)
        brightness(1.14);
      opacity: 0.24;
      mix-blend-mode: screen;
      animation: ambientFloat 7s ease-in-out infinite;
    }

    .screen {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
    }

    .hero-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    .hero-media {
      width: min(100%, 320px);
      height: auto;
      display: block;
      filter:
        drop-shadow(0 18px 36px rgba(0, 0, 0, 0.42))
        drop-shadow(0 0 18px rgba(42, 167, 235, 0.18));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      object-fit: contain;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .button {
      --white: #e8f7ff;
      --button-bg: #1b7fc2;
      --button-bg-deep: #0e5f97;
      --radius: 100px;
      outline: none;
      cursor: pointer;
      border: 0;
      position: relative;
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, #2aa7eb 0%, var(--button-bg) 55%, var(--button-bg-deep) 100%);
      transition: all 0.2s ease;
      box-shadow:
        inset 0 0.28rem 0.9rem rgba(255, 255, 255, 0.34),
        inset 0 -0.14rem 0.35rem rgba(2, 34, 56, 0.5),
        inset 0 -0.45rem 1rem rgba(255, 255, 255, 0.22),
        0 1.2rem 2rem rgba(20, 107, 163, 0.38),
        0 0.5rem 1rem -0.4rem rgba(0, 0, 0, 0.55);
    }

    .button .wrap {
      font-size: clamp(30px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #ffffff;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.75),
        0 0 30px rgba(122, 214, 255, 0.42),
        0 2px 0 rgba(9, 42, 69, 0.38);
      padding: 30px 42px;
      border-radius: inherit;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
    }

    .button .wrap p {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      transition: all 0.2s ease;
      transform: translateY(2%);
      mask-image: linear-gradient(to bottom, white 40%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, white 40%, transparent);
    }

    .button .wrap::before,
    .button .wrap::after {
      content: "";
      position: absolute;
      transition: all 0.3s ease;
    }

    .button .wrap::before {
      left: -15%;
      right: -15%;
      bottom: 25%;
      top: -100%;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.18);
    }

    .button .wrap::after {
      left: 6%;
      right: 6%;
      top: 12%;
      bottom: 40%;
      border-radius: 22px 22px 0 0;
      box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.95);
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.34) 0%,
        rgba(0, 0, 0, 0) 50%,
        rgba(0, 0, 0, 0) 100%
      );
    }

    .button:hover {
      box-shadow:
        inset 0 0.3rem 0.6rem rgba(255, 255, 255, 0.42),
        inset 0 -0.1rem 0.3rem rgba(2, 34, 56, 0.52),
        inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.28),
        0 1.4rem 2.4rem rgba(20, 107, 163, 0.45),
        0 0.6rem 1rem -0.4rem rgba(0, 0, 0, 0.55);
    }

    .button:hover .wrap::before {
      transform: translateY(-5%);
    }

    .button:hover .wrap::after {
      opacity: 0.4;
      transform: translateY(5%);
    }

    .button:hover .wrap p {
      transform: translateY(-4%);
    }

    .button:active {
      transform: translateY(4px);
      box-shadow:
        inset 0 0.3rem 0.5rem rgba(255, 255, 255, 0.45),
        inset 0 -0.1rem 0.3rem rgba(2, 34, 56, 0.6),
        inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.2),
        0 1rem 1.6rem rgba(20, 107, 163, 0.35),
        0 0.4rem 0.8rem -0.4rem rgba(0, 0, 0, 0.55);
    }

    .button:focus-visible {
      outline: 2px solid rgba(122, 214, 255, 0.9);
      outline-offset: 6px;
    }

    @keyframes ambientFloat {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(2.2);
        opacity: 0.2;
      }
      50% {
        transform: translate(-50%, -50%) scale(2.42);
        opacity: 0.3;
      }
    }

    @media (max-width: 820px) {
      .stack {
        gap: 22px;
      }

      .ambient-glow img {
        width: min(170vmin, 900px);
        filter:
          blur(88px)
          grayscale(0.18)
          saturate(0.72)
          hue-rotate(160deg)
          brightness(1.1);
        opacity: 0.22;
      }

      .hero-media {
        width: min(100%, 260px);
      }

      .button {
        width: min(100%, 420px);
      }

      .button .wrap {
        padding: 28px 26px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient-glow" aria-hidden="true">
    <img
      src="./utyaduckfull_agadbiyaajnieuk.gif"
      alt=""
      draggable="false"
    >
  </div>
  <main class="screen">
    <section class="stack">
      <div class="hero-shell" aria-hidden="true">
        <img
          class="hero-media"
          src="./utyaduckfull_agadbiyaajnieuk.gif"
          alt="Анимированная утка с телефоном Telegram"
          draggable="false"
        >
      </div>
      <button id="openProxyButton" class="button" type="button" aria-label="Вернуть тг">
        <div class="wrap">
          <p>Вернуть тг</p>
        </div>
      </button>
    </section>
  </main>

  <script>
    const linksPool = [
      "https://t.me/proxy?server=alpha.freetelega.me&port=2053&secret=ee667779b701c2b312ea39b17f6142719879612e7275",
      "https://t.me/proxy?server=bravo.freetelega.me&port=2053&secret=eee78e764b14cebc7a57289057cc239bf879612e7275"
    ];

    const button = document.getElementById("openProxyButton");

    function pickRandomLink() {
      const index = Math.floor(Math.random() * linksPool.length);
      return linksPool[index];
    }

    function openProxy() {
      const link = pickRandomLink();
      window.open(link, "_blank", "noopener,noreferrer");
    }

    button.addEventListener("click", openProxy);
  </script>
</body>
</html>
